<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат-бот</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&family=Halant:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1 class="title">Чат-бот</h1>

        <div class="chat" id="chat">
            <div class="messages" id="messages"></div>
        </div>

        <form class="input-bar" id="form" autocomplete="off">
            <input
                type="text"
                class="input-field"
                id="input"
                placeholder="Сообщение …"
                maxlength="200"
            >
            <button type="submit" class="send-button" id="send" disabled aria-label="Отправить">
                <img src="assets/paper-plane.svg" alt="">
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
